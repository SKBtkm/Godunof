<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godunoff</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.header h1 {
  margin: 0;
  font-size: 26px;
  font-weight: 600;
}

.header p {
  margin: 3px 0 0;
  font-size: 13px;
  color: #666;
}

/* Cards */
.card {
  background: #fff;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
}

.name {
  font-size: 14px;
  font-weight: 500;
}

.price {
  font-size: 13px;
  color: #1a73e8;
  margin-top: 4px;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
}

.btn {
  background: #1a73e8;
  color: #fff;
  border: none;
  width: 34px;
  height: 34px;
  border-radius: 8px;
  font-size: 18px;
}

.btn:active {
  transform: scale(0.95);
}

.qty {
  width: 40px;
  text-align: center;
  border: none;
  font-size: 16px;
  background: transparent;
}

/* Order */
.order {
  margin-top: 15px;
}

.order p {
  font-size: 12px;
  color: #666;
  margin-bottom: 6px;
}

.order input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
  box-sizing: border-box;
}

.order-btn {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #1a73e8;
  color: white;
  font-size: 16px;
  font-weight: 500;
}

.order-btn:active {
  transform: scale(0.98);
}
</style>

</head>

<body>

<div class="container">

  <div class="header">
    <h1>Godunoff</h1>
    <p>from Serdar Boroda</p>
  </div>

  <!-- Товары -->
  <div class="card">
    <div class="name">Кедровый орех 40% 0.5л</div>
    <div class="price">300 TMT</div>
    <div class="controls">
      <button class="btn" onclick="change('cedar', -1)">−</button>
      <input id="cedar" class="qty" value="0" readonly>
      <button class="btn" onclick="change('cedar', 1)">+</button>
    </div>
  </div>

  <div class="card">
    <div class="name">Gold 40% 0.5л</div>
    <div class="price">300 TMT</div>
    <div class="controls">
      <button class="btn" onclick="change('gold05', -1)">−</button>
      <input id="gold05" class="qty" value="0" readonly>
      <button class="btn" onclick="change('gold05', 1)">+</button>
    </div>
  </div>

  <div class="card">
    <div class="name">Black Edition 40% 0.5л</div>
    <div class="price">300 TMT</div>
    <div class="controls">
      <button class="btn" onclick="change('black', -1)">−</button>
      <input id="black" class="qty" value="0" readonly>
      <button class="btn" onclick="change('black', 1)">+</button>
    </div>
  </div>

  <div class="card">
    <div class="name">Royal 40% 0.5л</div>
    <div class="price">300 TMT</div>
    <div class="controls">
      <button class="btn" onclick="change('royal', -1)">−</button>
      <input id="royal" class="qty" value="0" readonly>
      <button class="btn" onclick="change('royal', 1)">+</button>
    </div>
  </div>

  <div class="card">
    <div class="name">Platinum 40% 0.5л</div>
    <div class="price">300 TMT</div>
    <div class="controls">
      <button class="btn" onclick="change('platinum', -1)">−</button>
      <input id="platinum" class="qty" value="0" readonly>
      <button class="btn" onclick="change('platinum', 1)">+</button>
    </div>
  </div>

  <div class="card">
    <div class="name">Gold 40% 0.7л</div>
    <div class="price">300 TMT</div>
    <div class="controls">
      <button class="btn" onclick="change('gold07', -1)">−</button>
      <input id="gold07" class="qty" value="0" readonly>
      <button class="btn" onclick="change('gold07', 1)">+</button>
    </div>
  </div>

  <!-- Оформление -->
  <div class="order">
    <p>Укажите номер телефона и комментарий к заказу</p>
    <input id="contact" placeholder="+993... доставка, комментарий">
    <button class="order-btn" onclick="order()">Оформить заказ</button>
  </div>

</div>

<script>
function change(id, delta) {
  let el = document.getElementById(id);
  let val = parseInt(el.value);
  val = Math.max(0, val + delta);
  el.value = val;
}

function order() {

  let items = "";

  function addItem(name, id) {
    let val = document.getElementById(id).value;
    if (val > 0) {
      items += `${name}: ${val}%0A`;
    }
  }

  addItem("Кедровый", "cedar");
  addItem("Gold 0.5", "gold05");
  addItem("Black", "black");
  addItem("Royal", "royal");
  addItem("Platinum", "platinum");
  addItem("Gold 0.7", "gold07");

  let contact = document.getElementById("contact").value;

  let text = `ЗАКАЗ GODUNOFF:%0A${items}%0AКонтакт: ${contact}`;

  let phone = "99361828377";

  window.location.href = `sms:${phone}?body=${encodeURIComponent(text)}`;
}
</script>

</body>
</html>
