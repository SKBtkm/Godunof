<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godunoff | Premium</title>

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --accent-color: #d4af37; /* Золотой акцент */
            --text-main: #ffffff;
            --text-dim: #a1a1a6;
            --btn-bg: #2c2c2e;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* ===== ЭКРАН ВХОДА ===== */
        #startScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        #startScreen h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #startScreen p {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .start-btn {
            margin-top: 40px;
            padding: 18px 40px;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* ===== КАТАЛОГ ===== */
        #catalog {
            display: none;
            padding-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
            border: 1px solid #333;
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-image {
            width: 100%;
            height: 220px;
            background-size: cover;
            background-position: center;
            background-color: #2c2c2e; /* Заглушка, пока нет фото */
        }

        .card-content {
            padding: 20px;
        }

        .name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .price {
            font-size: 16px;
            color: var(--accent-color);
            font-weight: 500;
            margin-bottom: 20px;
        }

        .qty-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 10px;
            display: block;
        }

        /* Кнопки количества */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .quick-grid button {
            padding: 12px 0;
            border: none;
            border-radius: 12px;
            background: var(--btn-bg);
            color: white;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .quick-grid button.active {
            background: var(--text-main);
            color: var(--bg-color);
            transform: scale(1.05);
        }

        /* Скрытое поле для хранения значения */
        .hidden-input { display: none; }

        /* Оформление заказа */
        .order-box {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
        }

        .order-box input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: white;
            padding: 15px 0;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }

        .order-box input:focus {
            border-bottom-color: var(--accent-color);
        }

        .order-btn {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            border: none;
            background: var(--accent-color);
            color: #000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #555;
            margin-top: 30px;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">

    <div id="startScreen">
        <h1>Godunoff</h1>
        <p>by Serdar Boroda</p>
        <button class="start-btn" onclick="openCatalog()">ВИТРИНА</button>
    </div>

    <div id="catalog">

        <div class="card">
            <div class="card-image" style="background-image: url('image1.jpg');"></div>
            <div class="card-content">
                <div class="name">Кедровый орех 40%</div>
                <div class="price">300 TMT / 0.5л</div>
                
                <span class="qty-label">ВЫБЕРИТЕ КОЛИЧЕСТВО (ШТ):</span>
                <div class="quick-grid" id="grid_cedar">
                    <button onclick="selectVal('cedar', 1, this)">1</button>
                    <button onclick="selectVal('cedar', 5, this)">5</button>
                    <button onclick="selectVal('cedar', 10, this)">10</button>
                    <button onclick="selectVal('cedar', 20, this)">20</button>
                    <button onclick="selectVal('cedar', 30, this)">30</button>
                    <button onclick="selectVal('cedar', 50, this)">50</button>
                    <button onclick="selectVal('cedar', 100, this)">100</button>
                    <button onclick="selectVal('cedar', 0, this)">Сброс</button>
                </div>
                <input type="number" id="cedar" value="0" class="hidden-input">
            </div>
        </div>

        <div class="card">
            <div class="card-image" style="background-image: url('image2.jpg');"></div>
            <div class="card-content">
                <div class="name">Gold Premium 40%</div>
                <div class="price">300 TMT / 0.5л</div>
                
                <span class="qty-label">ВЫБЕРИТЕ КОЛИЧЕСТВО (ШТ):</span>
                <div class="quick-grid" id="grid_gold">
                    <button onclick="selectVal('gold', 1, this)">1</button>
                    <button onclick="selectVal('gold', 5, this)">5</button>
                    <button onclick="selectVal('gold', 10, this)">10</button>
                    <button onclick="selectVal('gold', 20, this)">20</button>
                    <button onclick="selectVal('gold', 30, this)">30</button>
                    <button onclick="selectVal('gold', 50, this)">50</button>
                    <button onclick="selectVal('gold', 100, this)">100</button>
                    <button onclick="selectVal('gold', 0, this)">Сброс</button>
                </div>
                <input type="number" id="gold" value="0" class="hidden-input">
            </div>
        </div>

        <div class="order-box">
            <input id="contact" placeholder="Ваш телефон и комментарий">
            <button class="order-btn" onclick="order()">ПОДТВЕРДИТЬ ЗАКАЗ</button>
        </div>

        <div class="footer">
            EST. 2026 | SERDAR BORODA SPECIAL EDITION
        </div>

    </div>
</div>

<script>
function openCatalog() {
    document.getElementById("startScreen").style.display = "none";
    let cat = document.getElementById("catalog");
    cat.style.display = "block";
}

function selectVal(id, value, btn) {
    // Сохраняем значение
    document.getElementById(id).value = value;

    // Убираем активный класс у всех кнопок в этой группе
    let parent = btn.parentElement;
    let buttons = parent.getElementsByTagName('button');
    for (let b of buttons) {
        b.classList.remove('active');
    }

    // Добавляем активный класс нажатой кнопке (кроме сброса)
    if (value > 0) {
        btn.classList.add('active');
    }
}

function order() {
    function getItem(name, id) {
        let val = document.getElementById(id).value;
        return val > 0 ? `• ${name}: ${val} шт\n` : "";
    }

    let items = getItem("Кедровый орех", "cedar") + getItem("Gold Premium", "gold");
    let contact = document.getElementById("contact").value;

    if (!items) {
        alert("Выберите хотя бы один товар");
        return;
    }

    let text = `🛒 НОВЫЙ ЗАКАЗ GODUNOFF\n\n${items}\n📞 Контакт: ${contact}`;
    let phone = "99365858463";

    window.location.href = `sms:${phone}?body=${encodeURIComponent(text)}`;
}
</script>

</body>
</html>
