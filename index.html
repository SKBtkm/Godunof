<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godunoff</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
}

/* Общий контейнер */
.container {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

/* ===== ЭКРАН ВХОДА ===== */
#startScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#startScreen h1 {
  font-size: 32px;
  margin: 0;
}

#startScreen p {
  font-size: 13px;
  color: #666;
  margin-top: 5px;
}

.start-btn {
  margin-top: 20px;
  padding: 14px 20px;
  background: #1a73e8;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
}

/* ===== КАТАЛОГ ===== */
#catalog {
  display: none;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Карточки */
.card {
  background: #fff;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
}

.name {
  font-size: 14px;
  font-weight: 500;
}

.price {
  font-size: 13px;
  color: #1a73e8;
  margin-top: 4px;
}

/* Слайдер */
.slider {
  width: 100%;
  margin-top: 10px;
}

.qty-value {
  text-align: center;
  font-size: 14px;
  margin-top: 5px;
}

/* Быстрые кнопки */
.quick {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.quick button {
  flex: 1;
  padding: 6px;
  font-size: 12px;
  border: none;
  border-radius: 8px;
  background: #e8f0fe;
  color: #1a73e8;
}

/* Заказ */
.order {
  margin-top: 15px;
}

.order input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.order-btn {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #1a73e8;
  color: white;
  font-size: 16px;
}

.footer {
  text-align: center;
  font-size: 11px;
  color: #999;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

  <!-- ===== START SCREEN ===== -->
  <div id="startScreen">
    <h1>Godunoff</h1>
    <p>from Serdar Boroda</p>
    <button class="start-btn" onclick="openCatalog()">Перейти к заказу</button>
  </div>

  <!-- ===== CATALOG ===== -->
  <div id="catalog">

    <div class="card">
      <div class="name">Кедровый орех 40% 0.5л</div>
      <div class="price">300 TMT</div>

      <input type="range" min="0" max="100" value="0" class="slider" id="cedar" oninput="updateValue('cedar')">
      <div class="qty-value" id="cedarVal">0</div>

      <div class="quick">
        <button onclick="setVal('cedar',5)">5</button>
        <button onclick="setVal('cedar',10)">10</button>
        <button onclick="setVal('cedar',20)">20</button>
        <button onclick="setVal('cedar',50)">50</button>
        <button onclick="setVal('cedar',100)">100</button>
      </div>
    </div>

    <div class="card">
      <div class="name">Gold 40% 0.5л</div>
      <div class="price">300 TMT</div>

      <input type="range" min="0" max="100" value="0" class="slider" id="gold05" oninput="updateValue('gold05')">
      <div class="qty-value" id="gold05Val">0</div>

      <div class="quick">
        <button onclick="setVal('gold05',5)">5</button>
        <button onclick="setVal('gold05',10)">10</button>
        <button onclick="setVal('gold05',20)">20</button>
        <button onclick="setVal('gold05',50)">50</button>
        <button onclick="setVal('gold05',100)">100</button>
      </div>
    </div>

    <!-- (Остальные товары аналогично) -->

    <div class="order">
      <input id="contact" placeholder="+993... комментарий">
      <button class="order-btn" onclick="order()">Оформить заказ</button>
    </div>

    <div class="footer">
      Разработано специально для Serdar Boroda
    </div>

  </div>

</div>

<script>
function openCatalog() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("catalog").style.display = "block";
}

function updateValue(id) {
  let val = document.getElementById(id).value;
  document.getElementById(id + "Val").innerText = val;
}

function setVal(id, value) {
  document.getElementById(id).value = value;
  updateValue(id);
}

function order() {

  function getItem(name, id) {
    let val = document.getElementById(id).value;
    if (val > 0) {
      return `• ${name} — ${val} шт\n`;
    }
    return "";
  }

  let items = 
    getItem("Кедровый орех 40%", "cedar") +
    getItem("Gold 40%", "gold05");

  let contact = document.getElementById("contact").value;

  let text = `🛒 ЗАКАЗ GODUNOFF\n\n${items}\n📞 Контакт:\n${contact}`;

  let phone = "99365858463";

  window.location.href = `sms:${phone}?body=${encodeURIComponent(text)}`;
}
</script>

</body>
</html>
